<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div>
        <h1>Mergington High School</h1>
        <h2>Extracurricular Activities</h2>
      </div>
      <div class="header-actions">
        <button id="account-button" class="account-button" type="button">
          <span class="account-avatar" aria-hidden="true"></span>
          <span id="account-button-label">Teacher Login</span>
        </button>
      </div>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <div class="section-heading">
          <h3>Teacher Registration Controls</h3>
          <p id="auth-status-copy" class="auth-status-copy">
            Log in to register or unregister students.
          </p>
        </div>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <div id="account-panel" class="account-panel hidden">
      <button id="login-launch-button" class="account-panel-button" type="button">Log In</button>
      <button id="logout-button" class="account-panel-button hidden" type="button">Log Out</button>
    </div>

    <div id="login-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="login-modal-title">
      <div class="modal-card">
        <div class="modal-header">
          <h3 id="login-modal-title">Teacher Login</h3>
          <button id="close-login-modal" class="modal-close" type="button" aria-label="Close login dialog">Close</button>
        </div>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" required autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" required autocomplete="current-password" />
          </div>
          <button type="submit">Log In</button>
        </form>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
